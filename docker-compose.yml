version: "3.9"

services:
  catalog-db:
    image: mongo:7
    container_name: catalog-db
    ports:
      - "27017:27017"
    volumes:
      - catalog_db_data:/data/db

  user-db:
    image: mongo:7
    container_name: user-db
    ports:
      - "27018:27017"
    volumes:
      - user_db_data:/data/db

  order-db:
    image: mongo:7
    container_name: order-db
    ports:
      - "27019:27017"
    volumes:
      - order_db_data:/data/db

  inventory-db:
    image: mongo:7
    container_name: inventory-db
    ports:
      - "27020:27017"
    volumes:
      - inventory_db_data:/data/db

  payment-db:
    image: mongo:7
    container_name: payment-db
    ports:
      - "27021:27017"
    volumes:
      - payment_db_data:/data/db

  catalog-service:
    build: ./services/catalog-service
    container_name: catalog-service
    depends_on:
      - catalog-db
    environment:
      PORT: 3001
      MONGO_URI: mongodb://catalog-db:27017/catalog_db
    ports:
      - "3001:3001"

  user-service:
    build: ./services/user-service
    container_name: user-service
    depends_on:
      - user-db
    environment:
      PORT: 3002
      MONGO_URI: mongodb://user-db:27017/user_db
    ports:
      - "3002:3002"

  order-service:
    build: ./services/order-service
    container_name: order-service
    depends_on:
      - order-db
      - user-service
      - catalog-service
      - inventory-service
      - payment-service
    environment:
      PORT: 3003
      MONGO_URI: mongodb://order-db:27017/order_db
      USER_SERVICE_URL: http://user-service:3002
      CATALOG_SERVICE_URL: http://catalog-service:3001
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
    ports:
      - "3003:3003"

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    depends_on:
      - inventory-db
    environment:
      PORT: 3004
      MONGO_URI: mongodb://inventory-db:27017/inventory_db
    ports:
      - "3004:3004"

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    depends_on:
      - payment-db
    environment:
      PORT: 3005
      MONGO_URI: mongodb://payment-db:27017/payment_db
    ports:
      - "3005:3005"

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    depends_on:
      - catalog-service
      - user-service
      - order-service
      - inventory-service
      - payment-service
    ports:
      - "8080:80"

volumes:
  catalog_db_data:
  user_db_data:
  order_db_data:
  inventory_db_data:
  payment_db_data:
